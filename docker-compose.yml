services:

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  db:
    image: postgres:16
    environment:
      POSTGRES_DB: scraper
      POSTGRES_USER: scraper
      POSTGRES_PASSWORD: scraper
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U scraper"]
      interval: 5s
      timeout: 5s
      retries: 10

  migrate:
    build: .
    command: python migrate.py
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
    restart: "no"

  api:
    build: .
    command: python main.py api
    env_file: .env
    environment:
      REDIS_URL: redis://redis:6379/1
    ports:
      - "8000:8000"
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy

  worker-tmdb:
    build: .
    command: python main.py worker tmdb
    env_file: .env
    depends_on:
      migrate:
        condition: service_completed_successfully

  worker-tpdb:
    build: .
    command: python main.py worker tpdb
    env_file: .env
    depends_on:
      migrate:
        condition: service_completed_successfully

  ingester-spotnet:
    build: .
    command: python main.py ingester spotnet
    env_file: .env
    depends_on:
      migrate:
        condition: service_completed_successfully

  ingester-xxxclub:
    build: .
    command: python main.py ingester xxxclub
    env_file: .env
    depends_on:
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped

volumes:
  db_data:
