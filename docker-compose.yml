  #     - "8000:8000"
  #   depends_on:
  #     migrate:
  #       condition: service_completed_successfully

  worker:
    build: .
    command: python main.py worker
    env_file: .env
    depends_on:
      migrate:
        condition: service_completed_successfully

  ingester-spotnet:
    build: .
    command: python main.py ingester spotnet
    env_file: .env
    depends_on:
      migrate:
        condition: service_completed_successfully

