services:

  db:
    image: postgres:16
    environment:
      POSTGRES_DB: scraper
      POSTGRES_USER: scraper
      POSTGRES_PASSWORD: scraper
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U scraper"]
      interval: 5s
      timeout: 5s
      retries: 10

  migrate:
    build: .
    command: python migrate.py
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
    restart: "no"

  # test-spotnet:
